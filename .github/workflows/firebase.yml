name: Flutter Build

on:
  push:
    branches:
      - develop

defaults:
  run:
    working-directory: ./mobile

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode google-services.json
        if: ${{ !env.ACT }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          architecture: x64
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Populate env variables
        env:
          API_URL: ${{ secrets.QA_API_URL }}
          PURCHASES_KEY: ${{ secrets.PURCHASES_KEY }}
        run: |
          echo "API_URL=$API_URL" > assets/.env
          echo "PURCHASES_KEY=$PURCHASES_KEY" >> assets/.env

      - name: Decode and create keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{secrets.STORE_PASSWORD}}
          KEY_PASSWORD: ${{secrets.KEY_PASSWORD}}
          KEY_ALIAS: ${{secrets.KEY_ALIAS}}
          STORE_FILE: ${{secrets.STORE_FILE}}
        run: |
          echo "storePassword=$STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=$STORE_FILE" >> android/key.properties

      # Build APK for QA
      - name: Populate QA env variables
        env:
          QA_API_URL: ${{ secrets.QA_API_URL }}
          PURCHASES_KEY: ${{ secrets.PURCHASES_KEY }}
        run: |
          echo "API_URL=$QA_API_URL" > assets/.env
          echo "PURCHASES_KEY=$PURCHASES_KEY" >> assets/.env

      - name: Build QA APK
        run: flutter build apk

      - name: Upload QA APK as artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: QA_APK
          path: ./mobile/build/app/outputs/flutter-apk/app-release.apk

      # Build APK for general users
      - name: Populate general env variables
        env:
          API_URL: ${{ secrets.API_URL }}
          PURCHASES_KEY: ${{ secrets.PURCHASES_KEY }}
        run: |
          echo "API_URL=$API_URL" > assets/.env
          echo "PURCHASES_KEY=$PURCHASES_KEY" >> assets/.env

      - name: Build General APK
        run: flutter build apk

      - name: Upload General APK as artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: General_APK
          path: ./mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload General APK to Firebase
        if: ${{ !env.ACT }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_PROJECT_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: team
          file: ./mobile/build/app/outputs/flutter-apk/app-release.apk
