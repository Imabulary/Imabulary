name: Flutter Build

on:
  push:
    branches:
      - master

defaults:
  run:
    working-directory: ./mobile

jobs:
  distribution:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode google-services.json
        if: ${{ !env.ACT }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          architecture: x64
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Dart/Flutter types
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify Flutter installation
        run: flutter doctor -v

      - name: Populate env variables
        env:
          API_URL: ${{ secrets.QA_API_URL }}
          PURCHASES_KEY: ${{ secrets.PURCHASES_KEY }}
        run: |
          echo "API_URL=$API_URL" > assets/.env
          echo "PURCHASES_KEY=$PURCHASES_KEY" >> assets/.env

      - name: Build APK
        run: flutter build apk -v
        

      - name: Upload APK
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          path: ./mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload artifact to Firebase App Distribution
        if: ${{ !env.ACT }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_PROJECT_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: testers
          file: ./mobile/build/app/outputs/flutter-apk/app-release.apk
