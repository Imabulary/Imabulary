name: Deploy to GCP

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GOOGLE_COMPUTE_ZONE: ${{ secrets.GCP_ZONE || 'us-central1-a' }}
      GOOGLE_COMPUTE_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
      CONTAINER_IMAGE: "gcr.io/${{ secrets.GCP_PROJECT_ID }}/my-app"

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Login to Google Cloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          service_account_key: ${{ env.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker ${GOOGLE_COMPUTE_REGION}-docker.pkg.dev
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://${GOOGLE_COMPUTE_REGION}-docker.pkg.dev

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ env.CONTAINER_IMAGE }}:${{ github.run_number }}

      - name: Install JQ
        run: sudo apt-get --yes install jq

      - name: Deploy new instance and manage IPs
        run: |
          NEW_INSTANCE="instance-build-${{ github.run_number }}"
          MACHINE_TYPE="${{ secrets.GCP_MACHINE_TYPE || 'f1-micro' }}"
          gcloud beta compute instances create-with-container "$NEW_INSTANCE" \
            --machine-type=$MACHINE_TYPE \
            --container-image=${{ env.CONTAINER_IMAGE }}:${{ github.run_number }} \
            --tags http-server,https-server \
            --zone $GOOGLE_COMPUTE_ZONE

          OLD_INSTANCE=$(gcloud compute instances list --filter="EXTERNAL_IP=('prod-ip')" --zones $GOOGLE_COMPUTE_ZONE --format=json | jq '.[0].name' --raw-output)

          gcloud compute instances delete-access-config "$NEW_INSTANCE" \
            --access-config-name "external-nat" \
            --zone $GOOGLE_COMPUTE_ZONE

          if [ "$OLD_INSTANCE" != "null" ]; then
            gcloud compute instances delete "$OLD_INSTANCE" --zone $GOOGLE_COMPUTE_ZONE
          fi

          gcloud compute instances add-access-config "$NEW_INSTANCE" \
            --access-config-name "external-nat" --address "prod-ip" \
            --zone $GOOGLE_COMPUTE_ZONE
