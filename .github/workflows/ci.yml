name: Deploy to GCP

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Login to Google Cloud
        uses: google-github-actions/setup-gcloud@v0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/my-app:${{ github.run_number }}

      - name: Install JQ
        run: sudo apt-get --yes install jq

      - name: Deploy new instance and manage IPs
        run: |
          NEW_INSTANCE="instance-build-${{ github.run_number }}"
          MACHINE_TYPE="${{ secrets.GCP_MACHINE_TYPE || 'f1-micro' }}"
          ZONE="${{ secrets.GCP_ZONE || 'us-central1-a' }}"
          gcloud beta compute instances create-with-container "$NEW_INSTANCE" \
            --machine-type=$MACHINE_TYPE \
            --container-image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/my-app:${{ github.run_number }} \
            --tags http-server,https-server \
            --zone $ZONE

          OLD_INSTANCE=$(gcloud compute instances list --filter="EXTERNAL_IP=('prod-ip')" --zones $ZONE --format=json | jq '.[0].name' --raw-output)

          gcloud compute instances delete-access-config "$NEW_INSTANCE" \
            --access-config-name "external-nat" \
            --zone $ZONE

          if [ "$OLD_INSTANCE" != "null" ]; then
            gcloud compute instances delete "$OLD_INSTANCE" --zone $ZONE
          fi

          gcloud compute instances add-access-config "$NEW_INSTANCE" \
            --access-config-name "external-nat" --address "prod-ip" \
            --zone $ZONE
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_COMPUTE_ZONE: ${{ secrets.GCP_ZONE || 'us-central1-a' }}
