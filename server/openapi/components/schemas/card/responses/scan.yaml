type: object
properties:
  result:
    type: object
    properties:
      translatedObjectsOnImage:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
              example: Машина
            score:
              type: integer
              example: 0.9
      imageUrl:
        type: string
        example: https://image-hosting.com/image-1
      generatedImageName:
        type: string
        example: car.png
