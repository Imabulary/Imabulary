type: object
properties:
  id:
    type: string
    description: The ID of the card
    example: '123e4567-e89b-12d3-a456-426614174000'
  word:
    type: string
    description: The detected word from the image
    example: 'apple'
  phrase:
    type: string
    description: A related phrase generated by the assistant
    example: 'An apple a day keeps the doctor away'
  explanation:
    type: string
    description: The explanation of the word
    example: 'A fruit that is usually red, green, or yellow'
    nullable: true
  speech_part:
    type: string
    description: The part of speech of the word
    example: 'noun'
    nullable: true
  translated_word:
    type: string
    description: The translated word
    example: 'яблуко'
  translated_phrase:
    type: string
    description: The translated phrase
    example: 'Яблуко в день тримає лікаря далеко'
  translated_explanation:
    type: string
    description: The translated explanation of the word
    example: 'Фрукт, який зазвичай червоний, зелений або жовтий'
    nullable: true
  target_language:
    type: string
    description: The target language code
    example: 'uk-UA'
  source_language:
    type: string
    description: The source language code
    example: 'en-US'
  image_url:
    type: string
    description: The URL of the uploaded image
    example: 'https://example.com/image.png'
  image_name:
    type: string
    description: The name of the uploaded image
    example: 'image.png'
  audio_url:
    type: string
    description: The URL of the voiceover audio file of a word
    example: 'https://example.com/word.mp3'
  audio_name:
    type: string
    description: The name of the uploaded image
    example: 'word.mp3'
  userId:
    type: string
    description: The ID of the user
    example: '123e4567-e89b-12d3-a456-426614174000'
    nullable: true
  createdAt:
    type: string
    format: date-time
    description: The date and time when the card was created
    example: '2023-07-08T14:48:00.000Z'
  updatedAt:
    type: string
    format: date-time
    description: The date and time when the card was last updated
    example: '2023-07-08T14:48:00.000Z'
