openapi: 3.0.0
info:
  title: Imabulary API
  description: API documentation for the Imabulary API
  version: 1.0.0

paths:
  /quiz/learn:
    $ref: './paths/quiz/learn.yaml'

  /feedback/categories:
    $ref: './paths/feedback/categories.yaml'

  /feedback/create:
    $ref: './paths/feedback/create.yaml'

  /flashcards/scan:
    post:
      tags:
        - flashcards
      summary: Scan an image and returns an array with detected objects on it
      description: |
        This endpoint:
        1. Scan an uploaded image
        2. Detects objects on it
        3. If the system detected only one object on image, returns a flashcard
        4. If the system detected a few objects on image, returns detected objects with score that determines the likelihood of depicting this object in a photo. Additionally it returns `generatedImageName` and `imageUrl` that will be used to create a flashcard
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Image to scan
      responses:
        '200':
          description: Successfully uploaded image and detected objects or, if there was only one object on photo, created flashcard
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ScanResponse'
                  - $ref: '#/components/schemas/CardResponse'
              examples:
                ScanResponse:
                  value:
                    $ref: '#/components/schemas/ScanResponse'
                CardResponse:
                  value:
                    image_url: https://google.com

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []

  /flashcards/create:
    post:
      tags:
        - flashcards
      summary: Creates a new flashcard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCardDTO'
      responses:
        '200':
          description: Successfully created flashcard
          content:
            application/json:
              schema:
                $ref: '#components/schemas/Card'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []

  /flashcards/:
    $ref: './paths/flashcards/flashcards.yaml'

  /flashcards/organize:
    $ref: './paths/flashcards/organize.yaml'

  /flashcards/disorganize:
    $ref: './paths/flashcards/disorganize.yaml'

  /flashcards/like:
    $ref: './paths/flashcards/like.yaml'

  /flashcards/dislike:
    $ref: './paths/flashcards/dislike.yaml'

  /sets:
    $ref: './paths/sets/sets.yaml'

  /sets/{id}:
    $ref: './paths/sets/sets-id.yaml'

  /users:
    $ref: './paths/users/users.yaml'

  /wallet:
    $ref: './paths/wallet/wallet.yaml'

  /wallet/collect:
    $ref: './paths/wallet/collect-award.yaml'

components:
  responses:
    InternalServerError:
      description: Server encountered an unexpected condition that prevented it from fulfilling the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    BadRequest:
      description: Server would not process the request due to something the server considered to be a client error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Occurs when you try to access a page that requires valid authentication credentials, but your current ones aren't recognized or are missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    $ref: './components/schemas/index.yaml'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
