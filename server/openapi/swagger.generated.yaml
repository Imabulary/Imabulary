openapi: 3.0.0
info:
  title: Imabulary API
  description: Documentation for the Imabulary API
  version: 1.0.0
paths:
  /quiz/learn:
    post:
      tags:
        - Quiz
      summary: User answer to quiz answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizDto'
        responses:
          '200':
            description: Answer was leaved successfully.
          '400': null
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /feedback/categories:
    get:
      tags:
        - Feedback
      summary: Get all feedback categories
      responses:
        '200':
          description: A list of feedback categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeedbackCategory'
  /feedback/create:
    post:
      tags:
        - Feedback
      summary: Create a feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeedbackDto'
      responses:
        '200':
          description: Feedback created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                summary: Successfully created
                value:
                  message: Thank you for your feedback!
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /feedback/create/no-desired-object:
    post:
      tags:
        - Feedback
      summary: Creates a feedback when user didn't find desired object in the list of recognized objects
      description: |
        It creates a feedback for us which we can later analyze to improve our system in case user scanned
        an image, we gave him a list of objects, but there was no object he wanted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoDesiredObjectFeedbackDTO'
      responses:
        '200':
          description: Successfully submited feedback
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: boolean
                    example: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
  /flashcards/scan:
    post:
      tags:
        - Flashcards
      summary: Scan an image and returns an array with detected objects on it
      description: |
        This endpoint:
        1. Scan an uploaded image
        2. Detects objects on it
        3. If the system detected only one object on image, returns a flashcard
        4. If the system detected a few objects on image, returns detected objects with score that determines the likelihood of depicting this object in a photo. Additionally it returns `generatedImageName` and `imageUrl` that will be used to create a flashcard
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Image to scan
      responses:
        '200':
          description: 'Successfully uploaded image and detected objects or, if there was only one object on photo, created flashcard'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ScanResponse'
                  - $ref: '#/components/schemas/CardResponse'
              examples:
                ScanResponse:
                  value:
                    $ref: '#/components/schemas/ScanResponse'
                CardResponse:
                  value:
                    image_url: 'https://google.com'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
  /flashcards/create:
    post:
      tags:
        - Flashcards
      summary: Creates a new flashcard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCardDTO'
      responses:
        '200':
          description: Successfully created flashcard
          content:
            application/json:
              schema:
                $ref: '#components/schemas/Card'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
  /flashcards/:
    get:
      tags:
        - Flashcards
      summary: Get all flashcards
      description: Get a list of all flashcards
      parameters:
        - name: pagination
          in: query
          description: Pagination parameters
          schema:
            $ref: '#/components/schemas/ServerPagination'
        - name: filters
          in: query
          description: Filters for querying flashcards
          schema:
            $ref: '#/components/schemas/Filters'
      responses:
        '200':
          description: List of all flashcards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllCardsResponse'
      security:
        - bearerAuth: []
  /flashcards/organize:
    put:
      tags:
        - Flashcards
      summary: Organize flashcards
      description: Organize flashcards into a set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizeFlashcardsDTO'
      responses:
        '200':
          description: Organize flashcards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllCardsResponse'
      security:
        - bearerAuth: []
  /flashcards/disorganize:
    delete:
      tags:
        - Flashcards
      summary: Disorganize flashcards
      description: Disorganize flashcards from a set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisorganizeFlashcardsDTO'
      responses:
        '200':
          description: Flashcards disorganized successfully
      security:
        - bearerAuth: []
  /flashcards/like:
    post:
      tags:
        - Flashcards
      summary: Like a flashcard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LikeFlashcardDto'
      responses:
        '200':
          description: Flashcard liked successfully
          content:
            application/json:
              schema:
                type: boolean
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /flashcards/dislike:
    post:
      tags:
        - Flashcards
      summary: Dislike a flashcard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DislikeFlashcardDto'
      responses:
        '200':
          description: Flashcard disliked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                summary: Successfully disliked
                value:
                  message: Thank you for your feedback!
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /sets:
    post:
      tags:
        - Sets
      summary: Create a new set
      description: Create a new set with a name and optional description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSetDto'
      responses:
        '201':
          description: Create set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetResponse'
      security:
        - bearerAuth: []
    get:
      tags:
        - sets
      summary: Get all sets
      description: Get a list of all sets
      parameters:
        - name: pagination
          in: query
          description: Pagination parameters
          schema:
            $ref: '#/components/schemas/ServerPagination'
      responses:
        '200':
          description: List of all sets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllSetsResponse'
      security:
        - bearerAuth: []
  '/sets/{id}':
    get:
      tags:
        - Sets
      summary: Get a single set
      description: Get details of a single set by ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the set
          schema:
            type: string
      responses:
        '200':
          description: Set details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetResponse'
        '404':
          description: When set is equals null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []
    patch:
      tags:
        - sets
      summary: Update a set
      description: Update the name or description of a set
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the set
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSetDto'
      responses:
        '200':
          description: Set updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetResponse'
      security:
        - bearerAuth: []
    delete:
      tags:
        - sets
      summary: Delete a set
      description: Delete a set by ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the set
          schema:
            type: string
      responses:
        '200':
          description: Set deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetResponse'
      security:
        - bearerAuth: []
  /users:
    post:
      tags:
        - Users
      summary: Create a new user
      description: Create a new user with UID and email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                uid:
                  type: string
                  description: UID must be a valid string
                  example: user-123456
                email:
                  type: string
                  description: Email must be a valid email address
                  example: user@example.com
              required:
                - uid
                - email
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      tags:
        - Users
      summary: Delete user and his resources permanently
      description: 'Delete user and his resources permanently includes flashcards, feedbacks, audio and image files'
      responses:
        '200':
          description: User and his resources deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /wallet:
    get:
      tags:
        - Wallet
      summary: Get wallet info
      description: Get info about user's wallet
      responses:
        '200':
          description: Return user's wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalance'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /wallet/collect:
    put:
      tags:
        - Wallet
      summary: Collect daily award
      description: 'Check award availability and collect daily award. Return current balance, expiration time in timestamp, next award prediction, and date of awarding in ISO string'
      responses:
        '200':
          description: Award had been collected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectAwardResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  responses:
    InternalServerError:
      description: Server encountered an unexpected condition that prevented it from fulfilling the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Server would not process the request due to something the server considered to be a client error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Server couldn't recognize your authentication credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateCardDTO:
      type: object
      properties:
        objectOnImage:
          type: string
          required: true
          example: Car
        imageUrl:
          type: string
          required: true
          example: 'https://images-hosting.com/image/1'
        generatedImageName:
          type: string
          required: true
          example: generate-image-name.png
    CreateNoDesiredObjectFeedbackDTO:
      type: object
      properties:
        imageUrl:
          type: string
          example: 'https://images-hosting.com/image/1'
          description: Path to the image user uploaded
        objectsOnImage:
          type: array
          items:
            type: string
          example:
            - Car
            - Wheel
            - Engine
          description: Objects that were detected
    CardResponse:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/Card'
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          description: The HTTP status code
        message:
          type: string
          description: The error message
        error:
          type: string
          description: The error title
    ScanResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            objectsOnImage:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    example: Car
                  translatedName:
                    type: string
                    example: Машина
                  score:
                    type: integer
                    example: 0.9
            imageUrl:
              type: string
              example: 'https://image-hosting.com/image-1'
            generatedImageName:
              type: string
              example: car.png
    AllCardsResponse:
      type: object
      properties:
        result:
          type: array
          items:
            $ref: '#/components/schemas/Card'
        total:
          type: integer
          description: Total number of flashcards
          example: 1
    Card:
      type: object
      properties:
        id:
          type: string
          description: The ID of the card
          example: 123e4567-e89b-12d3-a456-426614174000
        word:
          type: string
          description: The detected word from the image
          example: apple
        phrase:
          type: string
          description: A related phrase generated by the assistant
          example: An apple a day keeps the doctor away
        explanation:
          type: string
          description: The explanation of the word
          example: 'A fruit that is usually red, green, or yellow'
          nullable: true
        speech_part:
          type: string
          description: The part of speech of the word
          example: noun
          nullable: true
        translated_word:
          type: string
          description: The translated word
          example: яблуко
        translated_phrase:
          type: string
          description: The translated phrase
          example: Яблуко в день тримає лікаря далеко
        translated_explanation:
          type: string
          description: The translated explanation of the word
          example: 'Фрукт, який зазвичай червоний, зелений або жовтий'
          nullable: true
        target_language:
          type: string
          description: The target language code
          example: uk-UA
        source_language:
          type: string
          description: The source language code
          example: en-US
        image_url:
          type: string
          description: The URL of the uploaded image
          example: 'https://example.com/image.png'
        image_name:
          type: string
          description: The name of the uploaded image
          example: image.png
        is_regenerated:
          type: boolean
          description: 'Whether the flashcard was already regenerated, because of incorrect results for example'
          example: false
          nullable: true
        audio_url:
          type: string
          description: The URL of the voiceover audio file of a word
          example: 'https://example.com/word.mp3'
        audio_name:
          type: string
          description: The name of the uploaded image
          example: word.mp3
        userId:
          type: string
          description: The ID of the user
          example: 123e4567-e89b-12d3-a456-426614174000
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: The date and time when the card was created
          example: '2023-07-08T14:48:00.000Z'
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the card was last updated
          example: '2023-07-08T14:48:00.000Z'
        deletedAt:
          type: string
          format: date-time
          description: 'The date and time when the card was deleted. This property stands for soft deletion of flashcard, meaning that it won''t be deleted physically, but the user won''t see it also'
    OrganizeFlashcardsDTO:
      type: object
      properties:
        flashcardIds:
          type: array
          items:
            type: string
            format: uuid
          description: An array of flashcard IDs to be organized
          example:
            - 123e4567-e89b-12d3-a456-426614174000
        setId:
          type: string
          format: uuid
          description: The ID of the set to organize flashcards into
          example: 123e4567-e89b-12d3-a456-426614174000
      required:
        - flashcardIds
        - setId
    DisorganizeFlashcardsDTO:
      type: object
      properties:
        flashcardIds:
          type: array
          items:
            type: string
            format: uuid
          description: An array of flashcard IDs to be disorganized
          example:
            - 123e4567-e89b-12d3-a456-426614174000
        setId:
          type: string
          format: uuid
          description: The ID of the set to disorganize flashcards from
          example: 123e4567-e89b-12d3-a456-426614174000
    CreateSetDto:
      type: object
      properties:
        name:
          type: string
          description: Name of the set
          example: My Flashcard Set
        description:
          type: string
          description: Description of the set
          example: This is a set for organizing flashcards.
      required:
        - name
    UpdateSetDto:
      type: object
      properties:
        name:
          type: string
          description: Name of the set
          example: My Flashcard Set
        description:
          type: string
          description: Description of the set
          example: This is a set for organizing flashcards.
      required:
        - name
    ServerPagination:
      type: object
      properties:
        take:
          type: integer
          description: Number of items per page
          example: 100
        skip:
          type: integer
          description: Number of items to skip
          example: 0
    Filters:
      type: object
      additionalProperties:
        type: object
        properties:
          equals:
            type: string
            description: Filter by prisma property
    Sets:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the set.
        name:
          type: string
          description: Name of the set.
        description:
          type: string
          nullable: true
          description: Description of the set.
        userId:
          type: string
          nullable: true
          description: Identifier of the user who owns the set.
        flashcards:
          type: array
          items:
            $ref: '#/components/schemas/Card'
          description: List of flashcards associated with the set.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the set was created.
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the set was last updated.
        CardsOnSets:
          type: array
          items:
            $ref: '#/components/schemas/CardsOnSets'
          description: List of CardsOnSets associations.
    SetResponse:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/Sets'
    AllSetsResponse:
      type: object
      properties:
        result:
          type: array
          items:
            $ref: '#/components/schemas/Sets'
        total:
          type: integer
          example: 1
    CardsOnSets:
      type: object
      properties:
        setId:
          type: string
          format: uuid
          description: Unique identifier for the set.
        flashcardId:
          type: string
          format: uuid
          description: Unique identifier for the flashcard.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the CardsOnSets association was created.
    UserResponse:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/User'
    DeleteUserDto:
      type: object
      properties:
        uid:
          type: string
          description: UID must be a valid string
          example: user-123456
      required:
        - uid
    User:
      type: object
      properties:
        id:
          type: string
          description: The ID of the user
          example: 123e4567-e89b-12d3-a456-426614174000
        externalId:
          type: string
          description: The external ID of the user
          example: external-123456
        email:
          type: string
          description: The email of the user
          example: user@example.com
        createdAt:
          type: string
          format: date-time
          description: The date and time when the user was created
          example: '2023-07-08T14:48:00.000Z'
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the user was last updated
          example: '2023-07-08T14:48:00.000Z'
    WalletBalance:
      type: object
      properties:
        result:
          type: object
          properties:
            id:
              description: ID of the wallet
              type: string
              format: uuid
              example: ac94c2fa-8f89-43c9-abb4-2a8d417cd7fa
            userId:
              description: User id to which the wallet belongs
              type: string
              format: uuid
              example: a5780ee9-419e-445d-810f-12284cc3a9c4
            balance:
              description: User coin balance
              type: number
              format: float
              example: 1
            status:
              description: Wallet's status
              type: string
              enum:
                - ACTIVE
                - INACTIVE
              example: ACTIVE
    CollectAwardResponse:
      type: object
      properties:
        currentBalance:
          type: number
          format: float
          description: The current balance of the wallet
          example: 123.45
        lastAwardedAt:
          type: string
          format: date-time
          description: The ISO date when the last award was given
          example: '2023-07-08T14:48:00.000Z'
        nextAward:
          type: number
          format: float
          description: The next award amount
          example: 50
        expirationTime:
          type: integer
          description: The expiration time in seconds
          example: 3600
      required:
        - currentBalance
        - lastAwardedAt
        - nextAward
        - expirationTime
    LikeFlashcardDto:
      type: object
      required:
        - cardId
      properties:
        cardId:
          type: string
          description: ID of the flashcard
    DislikeFlashcardDto:
      type: object
      allOf:
        - $ref: '#/components/schemas/LikeFlashcardDto'
        - type: object
          properties:
            cardId:
              type: string
              description: ID of target card
            categoryId:
              type: string
              description: Optional categoryId. Should be null if text was specified
            text:
              type: string
              description: Optional text feedback. Should be null if categoryId was specified
    FeedbackCategory:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the feedback category
          example: 123e4567-e89b-12d3-a456-426614174000
        name:
          type: string
          description: The name of the feedback category
          example: translation_error_photo
        meaning:
          type: string
          description: The description or meaning of the feedback category
          example: This means that the system pulled up an incorrect translation.
    CreateFeedbackDto:
      - type: object
        properties:
          cardId:
            optional: true
            type: string
            description: ID of target card
          categoryId:
            type: string
            description: Optional categoryId. Should be null if text was specified
          text:
            type: string
            description: Optional text feedback. Should be null if categoryId was specified
    QuizDto:
      type: object
      properties:
        cardId:
          type: string
          description: cardId
          example: 123e4567-e89b-12d3-a456-426614174000
        word:
          type: string
          description: User answer
          example: Apple
      required:
        - name
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
