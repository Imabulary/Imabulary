post:
  tags:
    - flashcards
  summary: Dislike a flashcard
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/card/dislike-flashcard-dto.yaml"
  responses:
    "200":
      description: Flashcard disliked successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message: 
                type: string
          examples:
                dislikeWithSave:
                  summary: Successfully disliked and saved flashcard
                  value:
                    message: "Thank you for your feedback!"
                alreadyDisliked:
                  summary: Flashcard was soft deleted
                  value:
                    message: "'Card soft deleted and removed from sets successfully. Thank you for your feedback!'"
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/error/error-response.yaml"
