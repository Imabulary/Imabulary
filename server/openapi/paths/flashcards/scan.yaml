post:
  tags:
    - flashcards
  summary: Scan flashcards
  description: Scan flashcards by uploading an image and processing it. This operation deducts 1 coin from the user's wallet and collect cashback.
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            file:
              type: string
              format: binary
              description: Flashcard image to be scanned
  responses:
    "201":
      description: Successfully processed the flashcard image
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/card/card-response.yaml"
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/error/error-response.yaml"
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/error/error-response.yaml"
  security:
    - bearerAuth: []
