get:
  tags:
    - Sets
  summary: Get a single set
  description: Get details of a single set by ID
  parameters:
    - name: id
      in: path
      required: true
      description: ID of the set
      schema:
        type: string
  responses:
    '200':
      description: Set details
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/set/set-response.yaml'

    '404':
      description: When set is equals null
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/error/error-response.yaml'
  security:
    - bearerAuth: []

patch:
  tags:
    - sets
  summary: Update a set
  description: Update the name or description of a set
  parameters:
    - name: id
      in: path
      required: true
      description: ID of the set
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/set/update-set-dto.yaml'
  responses:
    '200':
      description: Set updated successfully
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/set/set-response.yaml'

  security:
    - bearerAuth: []

delete:
  tags:
    - sets
  summary: Delete a set
  description: Delete a set by ID
  parameters:
    - name: id
      in: path
      required: true
      description: ID of the set
      schema:
        type: string
  responses:
    '200':
      description: Set deleted successfully
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/set/set-response.yaml'

  security:
    - bearerAuth: []
