post:
  summary: Synthesize text to speech
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/text-to-speech/text-to-speech-dto.yaml"
  responses:
    "200":
      description: Successfull request, returns MP3 file
      content:
        audio/mpeg:
          schema:
            type: string
            format: binary
