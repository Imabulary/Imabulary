get:
  tags:
    - wallet
  summary: Get coin balance
  description: Get current coin balance in float format
  responses:
    "200":
      description: Return user's coin balance
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/wallet/balance-response.yaml"
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/error/error-response.yaml"
    "404":
      description: Not found
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/error/error-response.yaml"