version: '3'
services:
  frontend:
    build: ./client
    ports:
      - 3001:3000
    container_name: imabulary_frontend
    env_file:
      - ./client/.env
    depends_on:
      - backend

  backend:
    build: ./server
    ports:
      - 5001:5000
    container_name: imabulary_backend
    env_file:
      - ./server/.env
    depends_on:
      - database

  database:
    image: postgres
    container_name: imabulary_database
    ports:
      - 5433:5432
    volumes:
      - imabulary_db_data:/var/lib/postgresql/data
    env_file:
      - ./server/.env

volumes:
  imabulary_db_data:
