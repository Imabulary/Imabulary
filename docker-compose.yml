  backend:
    build: ./server
    ports:
      - 5001:5000
    container_name: imabulary_backend
    env_file:
      - ./server/.env
    depends_on:
      - database

  database:
    image: postgres:16.0
    container_name: imabulary_database
    ports:
      - 5433:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - ./server/.env

volumes:
  db_data:
